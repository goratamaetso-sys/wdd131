<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lazy Loading Images</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Advent+Pro:ital,wght@0,100..900;1,100..900&amp;family=Noto+Sans:ital,wght@0,100..900;1,100..900&amp;display=swap">
    <script src="script/lazyload.js" defer></script>

</head>
<body>
    <main>
        <h1>Sunset Album</h1>
        <img src="images/beach-sunset.webp" alt="Sunset on the beach" loading="lazy" width="400" height="600">
        <img src="images/fall-sunset.webp" alt="A sunset during fall" loading="lazy" width="400" height="600">
        <img src="images/inyatisafari-sunset.webp" alt="A sunset over the Inyati safari" loading="lazy" width="400" height="600">
        <img src="images/mountain-sunset.webp" alt="A sunaet over the mountain" loading="lazy" width="400" height="600">
        <img src="images/ocean-sunset.webp" alt="A sunset over the ocean" loading="lazy" width="400" height="600">
        <img src="images/ulurutops-sunset.webp" alt="A sunset over the uluru tops" loading="lazy" width="400" height="600">
    </main>
    <footer>
        <p>©  <span id="currentyear"></span> ❤️Gorata Maetso | South Africa❤️</p>
        <p id="lastModified"></p>
    </footer>
    
</body>
</html>
